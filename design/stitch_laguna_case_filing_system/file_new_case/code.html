<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Guidance Office - File New Case</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;family=Source+Serif+4:wght@600;700&amp;family=IBM+Plex+Mono:wght@450&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-background": "#1a1c1c",
                        "on-surface-variant": "#444652",
                        "on-tertiary-container": "#ff765f",
                        "secondary": "#585f6c",
                        "primary-container": "#002f87",
                        "on-secondary-container": "#5e6572",
                        "on-secondary-fixed-variant": "#404754",
                        "secondary-container": "#dce2f3",
                        "on-primary-container": "#7f9cf8",
                        "surface-container": "#eeeeee",
                        "inverse-on-surface": "#f1f1f1",
                        "on-primary-fixed-variant": "#1d4097",
                        "on-primary-fixed": "#00174c",
                        "surface": "#f9f9f9",
                        "outline": "#747683",
                        "surface-tint": "#3a59b1",
                        "primary-fixed-dim": "#b4c5ff",
                        "surface-bright": "#f9f9f9",
                        "on-primary": "#ffffff",
                        "secondary-fixed-dim": "#c0c7d6",
                        "secondary-fixed": "#dce2f3",
                        "on-tertiary": "#ffffff",
                        "tertiary": "#4b0300",
                        "surface-container-high": "#e8e8e8",
                        "inverse-primary": "#b4c5ff",
                        "on-tertiary-fixed": "#400200",
                        "on-surface": "#1a1c1c",
                        "surface-container-low": "#f3f3f3",
                        "outline-variant": "#c4c6d4",
                        "tertiary-container": "#730700",
                        "background": "#f9f9f9",
                        "surface-dim": "#dadada",
                        "on-secondary": "#ffffff",
                        "primary": "#001c59",
                        "on-tertiary-fixed-variant": "#910b00",
                        "error": "#ba1a1a",
                        "primary-fixed": "#dbe1ff",
                        "tertiary-fixed-dim": "#ffb4a7",
                        "surface-variant": "#e2e2e2",
                        "on-error": "#ffffff",
                        "surface-container-highest": "#e2e2e2",
                        "error-container": "#ffdad6",
                        "on-error-container": "#93000a",
                        "on-secondary-fixed": "#151c27",
                        "inverse-surface": "#2f3131",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-fixed": "#ffdad4"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-md": "1rem",
                        "stack-sm": "0.5rem",
                        "margin-page": "2rem",
                        "sidebar-width": "240px",
                        "table-cell-padding": "12px 16px",
                        "gutter": "1.5rem"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "label-caps": ["Inter"],
                        "body-md": ["Inter"],
                        "section-header": ["\"Source Serif 4\""],
                        "data-mono": ["IBM Plex Mono"],
                        "display-title": ["\"Source Serif 4\""]
                    },
                    "fontSize": {
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "section-header": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "data-mono": ["13px", { "lineHeight": "18px", "fontWeight": "450" }],
                        "display-title": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        body { background-color: #F3F3F3; }
        .form-input-ring:focus { outline: none; box-shadow: 0 0 0 2px #002F87; border-color: transparent; }
    </style>
</head>
<body class="bg-[#F3F3F3] text-on-background font-body-md min-h-screen flex">
<!-- SideNavBar -->
<nav class="w-sidebar-width h-screen fixed left-0 top-0 border-r border-outline-variant bg-surface dark:bg-surface-dim flex flex-col py-stack-md z-10">
<div class="px-gutter mb-8">
<h1 class="font-display-title text-display-title text-primary dark:text-primary-fixed-dim">Laguna College</h1>
<p class="font-label-caps text-label-caps text-secondary uppercase tracking-wider mt-1">GUIDANCE OFFICE</p>
</div>
<div class="flex-grow flex flex-col gap-1">
<a class="flex items-center px-gutter py-3 text-secondary dark:text-secondary-fixed-dim hover:bg-surface-container dark:hover:bg-surface-container-high transition-colors duration-200 cursor-pointer active:scale-95" href="#">
<span class="material-symbols-outlined mr-3">folder_open</span>
<span class="font-body-md text-body-md">Case Catalog</span>
</a>
<a class="flex items-center px-gutter py-3 bg-secondary-container dark:bg-primary-container text-primary dark:text-on-primary-container border-l-4 border-primary dark:border-primary-fixed-dim font-semibold transition-colors duration-200 cursor-pointer active:scale-95" href="#">
<span class="material-symbols-outlined mr-3" style="font-variation-settings: 'FILL' 1;">add_box</span>
<span class="font-body-md text-body-md">File New Case</span>
</a>
<a class="flex items-center px-gutter py-3 text-secondary dark:text-secondary-fixed-dim hover:bg-surface-container dark:hover:bg-surface-container-high transition-colors duration-200 cursor-pointer active:scale-95" href="#">
<span class="material-symbols-outlined mr-3">assessment</span>
<span class="font-body-md text-body-md">Summary &amp; Reports</span>
</a>
</div>
<div class="mt-auto border-t border-outline-variant pt-4 flex flex-col gap-1">
<button class="flex items-center px-gutter py-3 text-secondary dark:text-secondary-fixed-dim hover:bg-surface-container dark:hover:bg-surface-container-high transition-colors duration-200 cursor-pointer active:scale-95 w-full text-left">
<span class="material-symbols-outlined mr-3">dark_mode</span>
<span class="font-body-md text-body-md">Dark Mode</span>
</button>
<button class="flex items-center px-gutter py-3 text-secondary dark:text-secondary-fixed-dim hover:bg-surface-container dark:hover:bg-surface-container-high transition-colors duration-200 cursor-pointer active:scale-95 w-full text-left">
<span class="material-symbols-outlined mr-3">account_circle</span>
<span class="font-body-md text-body-md">Counselor Profile</span>
</button>
</div>
</nav>
<!-- Main Content Area -->
<div class="ml-sidebar-width flex-grow flex flex-col min-h-screen">
<!-- TopAppBar -->
<header class="bg-surface-bright dark:bg-surface-container border-b border-outline-variant h-16 sticky top-0 flex items-center justify-between px-margin-page z-10 w-full transition-all duration-150 ease-in-out">
<div class="flex items-center gap-4">
<a class="text-secondary hover:text-primary transition-colors flex items-center" href="#">
<span class="material-symbols-outlined">arrow_back</span>
</a>
<h2 class="font-section-header text-section-header text-primary dark:text-primary-fixed-dim">File New Case</h2>
</div>
<div class="flex items-center gap-4">
<button class="text-on-surface-variant hover:text-primary transition-colors p-2">
<span class="material-symbols-outlined">filter_list</span>
</button>
<button class="text-on-surface-variant hover:text-primary transition-colors p-2">
<span class="material-symbols-outlined">settings</span>
</button>
<button class="bg-[#002F87] text-white px-4 py-2 rounded font-body-md hover:bg-primary-fixed-variant transition-colors flex items-center gap-2">
                    + New Case
                </button>
</div>
</header>
<!-- Form Canvas -->
<main class="flex-grow p-margin-page overflow-y-auto">
<div class="max-w-[1440px] mx-auto bg-surface-container-lowest border border-surface-variant rounded shadow-sm relative z-0">
<form class="p-8">
<div class="grid grid-cols-4 gap-8">
<!-- Col 1: Incident Details -->
<div class="col-span-4 md:col-span-1 space-y-6">
<div class="flex items-center gap-2 mb-4">
<span class="font-label-caps text-label-caps text-secondary uppercase tracking-widest bg-surface-container-low px-2 py-1 border border-outline-variant rounded-sm">Incident Details</span>
<div class="h-px bg-outline-variant flex-grow"></div>
</div>
<div class="space-y-4">
<div>
<label class="block font-body-md text-on-surface mb-1">Date &amp; Time</label>
<input class="w-full border border-surface-variant rounded-lg p-2 font-body-md text-on-surface form-input-ring transition-shadow bg-surface-bright" type="datetime-local"/>
</div>
<div>
<label class="block font-body-md text-on-surface mb-1">Location</label>
<input class="w-full border border-surface-variant rounded-lg p-2 font-body-md text-on-surface form-input-ring transition-shadow bg-surface-bright" placeholder="e.g. North Wing Hallway" type="text"/>
</div>
<div>
<label class="block font-body-md text-on-surface mb-1">Case Type</label>
<select class="w-full border border-surface-variant rounded-lg p-2 font-body-md text-on-surface form-input-ring transition-shadow bg-surface-bright appearance-none">
<option>Academic Integrity</option>
<option>Behavioral</option>
<option>Attendance</option>
<option>Property Damage</option>
</select>
</div>
</div>
</div>
<!-- Col 2: Student Involved -->
<div class="col-span-4 md:col-span-1 space-y-6">
<div class="flex items-center gap-2 mb-4">
<span class="font-label-caps text-label-caps text-secondary uppercase tracking-widest bg-surface-container-low px-2 py-1 border border-outline-variant rounded-sm">Student Involved</span>
<div class="h-px bg-outline-variant flex-grow"></div>
</div>
<div class="space-y-4">
<div>
<label class="block font-body-md text-on-surface mb-1">Student ID / Name</label>
<div class="relative">
<input class="w-full border border-surface-variant rounded-lg p-2 pl-8 font-body-md text-on-surface form-input-ring transition-shadow bg-surface-bright" placeholder="Search student..." type="text"/>
<span class="material-symbols-outlined absolute left-2 top-2.5 text-secondary text-sm">search</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div>
<label class="block font-body-md text-on-surface mb-1">Grade/Year</label>
<input class="w-full border border-surface-variant rounded-lg p-2 font-body-md text-on-surface form-input-ring transition-shadow bg-surface-container-low" readonly="" type="text"/>
</div>
<div>
<label class="block font-body-md text-on-surface mb-1">Section</label>
<input class="w-full border border-surface-variant rounded-lg p-2 font-body-md text-on-surface form-input-ring transition-shadow bg-surface-container-low" readonly="" type="text"/>
</div>
</div>
<button class="text-primary font-body-md hover:underline flex items-center gap-1 mt-2" type="button">
<span class="material-symbols-outlined text-sm">add</span> Add second student
                                </button>
</div>
</div>
<!-- Col 3: Report -->
<div class="col-span-4 md:col-span-1 space-y-6">
<div class="flex items-center gap-2 mb-4">
<span class="font-label-caps text-label-caps text-secondary uppercase tracking-widest bg-surface-container-low px-2 py-1 border border-outline-variant rounded-sm">Report</span>
<div class="h-px bg-outline-variant flex-grow"></div>
</div>
<div class="space-y-4">
<div>
<label class="block font-body-md text-on-surface mb-1">Reported By</label>
<input class="w-full border border-surface-variant rounded-lg p-2 font-body-md text-on-surface form-input-ring transition-shadow bg-surface-bright" placeholder="Teacher / Staff Name" type="text"/>
</div>
<div>
<label class="block font-body-md text-on-surface mb-1">Description</label>
<textarea class="w-full border border-surface-variant rounded-lg p-2 font-body-md text-on-surface form-input-ring transition-shadow bg-surface-bright resize-none" placeholder="Detailed account of the incident..." rows="4"></textarea>
</div>
<div>
<label class="block font-body-md text-on-surface mb-1">Rule / Policy Reference</label>
<input class="w-full border border-surface-variant rounded-lg p-2 font-body-md text-on-surface form-input-ring transition-shadow bg-surface-bright" placeholder="e.g. Handbook Section 4.2" type="text"/>
</div>
</div>
</div>
<!-- Col 4: Resolution -->
<div class="col-span-4 md:col-span-1 space-y-6">
<div class="flex items-center gap-2 mb-4">
<span class="font-label-caps text-label-caps text-secondary uppercase tracking-widest bg-surface-container-low px-2 py-1 border border-outline-variant rounded-sm">Resolution</span>
<div class="h-px bg-outline-variant flex-grow"></div>
</div>
<div class="space-y-4">
<div>
<label class="block font-body-md text-on-surface mb-2">Current Status</label>
<div class="flex border border-surface-variant rounded-lg overflow-hidden">
<button class="flex-1 py-2 font-body-md text-center bg-surface-bright border-r border-surface-variant hover:bg-surface-container-low transition-colors" type="button">Pending</button>
<button class="flex-1 py-2 font-body-md text-center bg-[#002F87] text-white border-r border-surface-variant" type="button">Resolved</button>
<button class="flex-1 py-2 font-body-md text-center bg-surface-bright hover:bg-surface-container-low transition-colors text-error" type="button">Reprimand</button>
</div>
</div>
<div>
<label class="block font-body-md text-on-surface mb-1">Disciplinary Actions / Notes</label>
<textarea class="w-full border border-surface-variant rounded-lg p-2 font-body-md text-on-surface form-input-ring transition-shadow bg-surface-bright resize-none" placeholder="Actions taken or recommended..." rows="4"></textarea>
</div>
</div>
</div>
</div>
<!-- Footer Actions -->
<div class="mt-12 pt-6 border-t border-outline-variant flex justify-end gap-4">
<button class="px-6 py-2 border border-surface-variant rounded text-on-surface font-body-md hover:bg-surface-container-low transition-colors bg-surface-bright" type="button">
                            Cancel
                        </button>
<button class="px-6 py-2 bg-[#002F87] text-white rounded font-body-md hover:bg-primary-fixed-variant transition-colors flex items-center gap-2" type="submit">
<span class="material-symbols-outlined text-sm">save</span>
                            File Case
                        </button>
</div>
</form>
</div>
</main>
</div>
</body></html>
